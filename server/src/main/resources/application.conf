# Hephaestus runtime configuration (service-runtime spec).
#
# Every operational value is overridable by an environment variable via a
# Typesafe Config ${?ENV_VAR} substitution. No secrets are committed here. In
# this milestone these values are loaded + validated only — no client is wired.

hephaestus {
  http {
    host = "0.0.0.0"
    host = ${?HTTP_HOST}
    port = 8080
    port = ${?HTTP_PORT}
  }

  # HermesMQ message-queue endpoint + the two media lanes Hephaestus consumes.
  # ingest/reprocess-lane name the two pull SUBSCRIPTIONS; ingest is drained first.
  hermes {
    endpoint = "hermesmq:8080"
    endpoint = ${?HERMES_ENDPOINT}
    ingest-lane = "media.ingest"
    ingest-lane = ${?HERMES_INGEST_LANE}
    reprocess-lane = "media.reprocess"
    reprocess-lane = ${?HERMES_REPROCESS_LANE}
  }

  # Consumer-loop tuning. Batches are small + backpressured; concurrency bounds
  # in-flight CPU-heavy processing. NOTE (ops): the client has no lease-extension,
  # so the reprocess/transcode subscription MUST be provisioned with a generous
  # server-side ack deadline — a slow transcode that exceeds it is safely
  # redelivered and re-produced byte-identically (idempotency, not lease-extend).
  consumer {
    batch-size = 4
    batch-size = ${?CONSUMER_BATCH_SIZE}
    concurrency = 2
    concurrency = ${?CONSUMER_CONCURRENCY}
    poll-interval = "1s"
    poll-interval = ${?CONSUMER_POLL_INTERVAL}
  }

  # Apollo object-store gRPC endpoint (originals in, derivatives out), the media
  # bucket, and the per-call gRPC deadline. host:port is parsed from `endpoint`.
  apollo {
    endpoint = "apollostorage:8443"
    endpoint = ${?APOLLO_ENDPOINT}
    media-bucket = "media"
    media-bucket = ${?APOLLO_MEDIA_BUCKET}
    deadline = "30s"
    deadline = ${?APOLLO_DEADLINE}
  }

  # Derivative output dimensions + the spec version stamped on every result.
  derivatives {
    thumbnail-px = 250
    thumbnail-px = ${?DERIVATIVE_THUMBNAIL_PX}
    sample-px = 850
    sample-px = ${?DERIVATIVE_SAMPLE_PX}
    spec-version = "v1"
    spec-version = ${?DERIVATIVE_SPEC_VERSION}
  }

  # Processing thresholds (e.g. only emit a sample when the long edge exceeds this).
  thresholds {
    sample-min-long-edge-px = 850
    sample-min-long-edge-px = ${?SAMPLE_MIN_LONG_EDGE_PX}
  }
}

# Dedicated dispatcher for the media consumer: the CPU-heavy processing (ffmpeg/vips
# shell-outs + transcodes) AND the pull loop's own async plumbing run here. Isolating
# them from Pekko's DEFAULT dispatcher — which serves the HTTP health endpoint — keeps
# health checks responsive under a burst of jobs.
hephaestus-media-dispatcher {
  type = Dispatcher
  executor = "thread-pool-executor"
  thread-pool-executor {
    fixed-pool-size = 4
    fixed-pool-size = ${?MEDIA_DISPATCHER_POOL_SIZE}
  }
  throughput = 1
}

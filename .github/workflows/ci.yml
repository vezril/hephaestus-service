name: CI

# Verifies every pull request targeting development or main: formatting,
# compilation, and the full test suite. Merging is blocked unless all required
# checks pass (branch protection). The suite is green without ffmpeg/libvips
# installed — the toolchain probe injects its command runner.
on:
  pull_request:
    branches: [development, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: CI only reads the repo (no package/image publish here).
permissions:
  contents: read

# read:packages token for resolving the shared GitHub Packages artifacts: the Lexicon
# gRPC stubs + async messages (io.codex, add-apollo-io / add-job-consumption) AND the
# HermesMQ client (me.cference.hermesmq, add-job-consumption). Both live on
# maven.pkg.github.com; sbt reads LEXICON_TOKEN in build.sbt's credentials block.
env:
  LEXICON_TOKEN: ${{ secrets.LEXICON_TOKEN }}

jobs:
  # Formatting is a separate job so a scalafmt violation fails independently of
  # the tests (a green test suite must not mask a format failure).
  format:
    name: Format (scalafmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: ./.github/actions/setup-scala
      - name: Check formatting
        run: sbt -batch scalafmtCheckAll scalafmtSbtCheck

  build-test:
    name: Compile & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0 # sbt-dynver needs full history + tags
      - uses: ./.github/actions/setup-scala
      # The media pipeline's real-tool integration tests shell out to ffmpeg/ffprobe
      # (video) and vips/vipsheader (images, pHash raster). Install both so those tests
      # run in CI rather than only the fake-based orchestration tests (add-media-pipeline).
      # The integration fixtures and pHash goldens assume the stock Ubuntu ffmpeg/libvips.
      - name: Install media toolchain (ffmpeg + libvips)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg libvips-tools
      - name: Compile
        run: sbt -batch compile Test/compile
      # scalafix as a CI gate (add-static-analysis): the configured rules (DisableSyntax,
      # OrganizeImports) now fail the build. Runs on the SemanticDB emitted by the compile
      # step above, before the coverage step's `clean` wipes it.
      - name: Scalafix (check)
        run: sbt -batch "scalafixAll --check"
      - name: Test (with coverage)
        # scoverage (add-static-analysis): coverage is REPORTED, not gated — add
        # `coverageMinimumStmtTotal := N` in build.sbt to enforce a floor once the suite is
        # mature. `clean` forces an instrumented recompile so the report is accurate.
        run: sbt -batch clean coverage test coverageReport

  # sbt-dynver sanity: an untagged commit must yield a snapshot (non-releasable)
  # version so releases can only come from an explicit tag.
  version-check:
    name: Version derivation (dynver)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-scala
      - name: Assert untagged build is a snapshot
        run: |
          VERSION=$(sbt -Dsbt.log.noformat=true -batch -error 'print version' | tail -n1 | perl -pe 's/\e\[[0-9;]*[a-zA-Z]//g' | tr -d '[:space:]')
          echo "Derived version: $VERSION"
          case "$VERSION" in
            *SNAPSHOT*|*-*-*) echo "OK: snapshot version" ;;
            *) echo "ERROR: untagged build produced a clean release version '$VERSION'"; exit 1 ;;
          esac

  # Secret scanning — fail the PR if a credential was committed (language-agnostic).
  # Mirrors the new-scala-service template exactly (curl-installed, version-pinned gitleaks
  # binary + `gitleaks detect`) so every constellation service scans identically.
  secrets-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0 # scan full history
      - name: gitleaks
        run: |
          V=8.18.4
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${V}/gitleaks_${V}_linux_x64.tar.gz" \
            | tar xz -C /tmp gitleaks
          /tmp/gitleaks detect --source . --redact --verbose

name: Dev publish

# Every push to development publishes an explicitly-unstable image (:dev and
# :dev-<short-sha>) after the tests pass, so the homelab can trial unreleased
# builds deliberately. Runs only on pushes to this repo's development branch —
# fork pull requests cannot push here, so secrets are never exposed to forks.
on:
  push:
    branches: [development]

# Never cancel a half-finished dev push (leaving the registry partially updated);
# serialize per ref instead.
concurrency:
  group: dev-${{ github.ref }}
  cancel-in-progress: false

# Only reads the repo (image push is authed via the Docker Hub login, not the
# GITHUB_TOKEN), so the workflow token stays read-only.
permissions:
  contents: read

env:
  IMAGE_NAME: hephaestus
  # read:packages token for resolving the Lexicon gRPC stubs (add-apollo-io).
  LEXICON_TOKEN: ${{ secrets.LEXICON_TOKEN }}

jobs:
  dev-publish:
    name: Test and publish dev image
    runs-on: ubuntu-latest
    # Forks can't push to this repo's development branch, so this never runs on a
    # fork; the owner guard is defense-in-depth against a mirrored branch.
    if: github.repository_owner == 'vezril'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Ensure Docker Hub credentials are present
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "$DOCKERHUB_USERNAME" ] || [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "ERROR: DOCKERHUB_USERNAME / DOCKERHUB_TOKEN secret is missing"
            exit 1
          fi

      - uses: ./.github/actions/setup-scala

      - name: Log in to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Run tests
        run: sbt -batch test

      # build.sbt reads DOCKERHUB_USERNAME to name the image namespace, so the
      # locally-built image matches the push targets below (single source of truth).
      - name: Build image
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: sbt -batch server/Docker/publishLocal

      # Image CVE scan (add-static-analysis). The shipped image bundles ffmpeg + libvips, a
      # real CVE surface, so the dev image is scanned before it is pushed to Docker Hub — the
      # homelab trials these :dev builds, so they need the same visibility as a release. Report
      # mode for now (exit-code 0), mirroring release.yml; flip exit-code to 1 to gate once the
      # base image is on a clean footing.
      - name: Compute scanned image ref
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          VERSION=$(sbt -Dsbt.log.noformat=true -batch -error 'print server/version' | tail -n1 | perl -pe 's/\e\[[0-9;]*[a-zA-Z]//g' | tr -d '[:space:]')
          echo "SCAN_IMAGE=$DOCKERHUB_USERNAME/$IMAGE_NAME:$VERSION" >> "$GITHUB_ENV"

      - name: Scan image for CVEs (Trivy)
        uses: aquasecurity/trivy-action@6c175e9c4083a92bbca2f9724c8a5e33bc2d97a5 # v0.30.0
        with:
          image-ref: ${{ env.SCAN_IMAGE }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0" # report only — does not fail the dev publish yet

      - name: Tag and push dev + dev-<short-sha>
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          VERSION=$(sbt -Dsbt.log.noformat=true -batch -error 'print server/version' | tail -n1 | perl -pe 's/\e\[[0-9;]*[a-zA-Z]//g' | tr -d '[:space:]')
          SHORT_SHA="$(echo "$COMMIT_SHA" | cut -c1-7)"
          LOCAL="$DOCKERHUB_USERNAME/$IMAGE_NAME:$VERSION"
          for TARGET in "$DOCKERHUB_USERNAME/$IMAGE_NAME:dev" "$DOCKERHUB_USERNAME/$IMAGE_NAME:dev-$SHORT_SHA"; do
            docker tag "$LOCAL" "$TARGET"
            docker push "$TARGET"
          done
